<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel Postulaciones — Confía en Ti</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0f172a;
    color: #e2e8f0;
    min-height: 100vh;
  }

  /* LOGIN */
  #login-screen {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
  }

  .login-box {
    background: #1e293b;
    border: 1px solid #334155;
    border-radius: 12px;
    padding: 48px;
    width: 360px;
    text-align: center;
  }

  .login-box h1 {
    font-size: 22px;
    font-weight: 700;
    margin-bottom: 8px;
    color: #f1f5f9;
  }

  .login-box p {
    font-size: 13px;
    color: #64748b;
    margin-bottom: 32px;
  }

  .login-box input {
    width: 100%;
    padding: 12px 16px;
    background: #0f172a;
    border: 1px solid #334155;
    border-radius: 8px;
    color: #f1f5f9;
    font-size: 15px;
    margin-bottom: 16px;
    outline: none;
  }

  .login-box input:focus {
    border-color: #C9A96E;
  }

  .btn-login {
    width: 100%;
    padding: 12px;
    background: #C9A96E;
    color: #0f172a;
    border: none;
    border-radius: 8px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
  }

  .btn-login:hover { background: #b8935a; }

  .error-msg {
    color: #f87171;
    font-size: 13px;
    margin-top: 12px;
    display: none;
  }

  /* PANEL */
  #panel-screen { display: none; }

  header {
    background: #1e293b;
    border-bottom: 1px solid #334155;
    padding: 20px 32px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  header h1 {
    font-size: 18px;
    font-weight: 700;
    color: #C9A96E;
  }

  header span {
    font-size: 13px;
    color: #64748b;
  }

  .stats {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
    padding: 24px 32px;
  }

  .stat-card {
    background: #1e293b;
    border: 1px solid #334155;
    border-radius: 10px;
    padding: 20px;
    text-align: center;
  }

  .stat-card .num {
    font-size: 32px;
    font-weight: 800;
    color: #C9A96E;
  }

  .stat-card .label {
    font-size: 12px;
    color: #64748b;
    margin-top: 4px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .filtros {
    padding: 0 32px 16px;
    display: flex;
    gap: 12px;
    align-items: center;
    flex-wrap: wrap;
  }

  .filtros label {
    font-size: 13px;
    color: #64748b;
  }

  .filtros select, .filtros input {
    padding: 8px 12px;
    background: #1e293b;
    border: 1px solid #334155;
    border-radius: 6px;
    color: #e2e8f0;
    font-size: 13px;
    outline: none;
  }

  .btn-refresh {
    padding: 8px 16px;
    background: #C9A96E;
    color: #0f172a;
    border: none;
    border-radius: 6px;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    margin-left: auto;
  }

  .tabla-wrap {
    padding: 0 32px 32px;
    overflow-x: auto;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }

  thead th {
    background: #1e293b;
    padding: 12px 16px;
    text-align: left;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: #64748b;
    border-bottom: 1px solid #334155;
    white-space: nowrap;
  }

  tbody tr {
    border-bottom: 1px solid #1e293b;
    transition: background 0.15s;
  }

  tbody tr:hover { background: #1e293b; }

  tbody td {
    padding: 14px 16px;
    vertical-align: top;
    color: #cbd5e1;
  }

  .badge {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
  }

  .badge-pendiente { background: #422006; color: #fb923c; }
  .badge-aprobada  { background: #14532d; color: #4ade80; }
  .badge-rechazada { background: #450a0a; color: #f87171; }
  .badge-realizada { background: #1e3a5f; color: #60a5fa; }

  .nombre { font-weight: 600; color: #f1f5f9; }
  .empresa { color: #C9A96E; font-weight: 500; }
  .email-link { color: #60a5fa; text-decoration: none; }
  .email-link:hover { text-decoration: underline; }

  .btn-accion {
    padding: 4px 10px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 600;
    cursor: pointer;
    border: none;
    margin-right: 4px;
  }

  .btn-aprobar { background: #14532d; color: #4ade80; }
  .btn-rechazar { background: #450a0a; color: #f87171; }

  .empty-state {
    text-align: center;
    padding: 80px 32px;
    color: #475569;
  }

  .empty-state .icon { font-size: 48px; margin-bottom: 16px; }
  .empty-state p { font-size: 15px; }

  .loading {
    text-align: center;
    padding: 48px;
    color: #475569;
  }

  .cargo-tag {
    background: #1e293b;
    border: 1px solid #334155;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 11px;
    color: #94a3b8;
  }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <h1>Panel Postulaciones</h1>
    <p>Confía en Ti — Equipos Comerciales</p>
    <input type="password" id="password-input" placeholder="Contraseña" onkeydown="if(event.key==='Enter') login()">
    <button class="btn-login" onclick="login()">Entrar</button>
    <p class="error-msg" id="error-msg">Contraseña incorrecta</p>
  </div>
</div>

<!-- PANEL -->
<div id="panel-screen">
  <header>
    <h1>Postulaciones — Confía en Ti</h1>
    <span id="ultima-actualizacion">—</span>
  </header>

  <div class="stats">
    <div class="stat-card">
      <div class="num" id="stat-total">—</div>
      <div class="label">Total</div>
    </div>
    <div class="stat-card">
      <div class="num" id="stat-pendientes">—</div>
      <div class="label">Pendientes</div>
    </div>
    <div class="stat-card">
      <div class="num" id="stat-aprobadas">—</div>
      <div class="label">Aprobadas</div>
    </div>
    <div class="stat-card">
      <div class="num" id="stat-realizadas">—</div>
      <div class="label">Realizadas</div>
    </div>
  </div>

  <div class="filtros">
    <label>Filtrar:</label>
    <select id="filtro-estado" onchange="cargarPostulaciones()">
      <option value="todas">Todas</option>
      <option value="pendiente">Pendientes</option>
      <option value="aprobada">Aprobadas</option>
      <option value="rechazada">Rechazadas</option>
      <option value="realizada">Realizadas</option>
    </select>
    <input type="text" id="filtro-buscar" placeholder="Buscar empresa o nombre..." oninput="filtrarLocal()">
    <button class="btn-refresh" onclick="cargarPostulaciones()">↻ Actualizar</button>
  </div>

  <div class="tabla-wrap">
    <div id="tabla-contenido" class="loading">Cargando...</div>
  </div>
</div>

<script>
const API = 'https://disc-backend-production-0e6b.up.railway.app';
const PASSWORD = 'confia2026';
let todasLasPostulaciones = [];

function login() {
  const pass = document.getElementById('password-input').value;
  if (pass === PASSWORD) {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('panel-screen').style.display = 'block';
    cargarPostulaciones();
  } else {
    document.getElementById('error-msg').style.display = 'block';
  }
}

async function cargarPostulaciones() {
  const estado = document.getElementById('filtro-estado').value;
  document.getElementById('tabla-contenido').innerHTML = '<div class="loading">Cargando...</div>';

  try {
    const res = await fetch(`${API}/api/charlas/postulaciones/${estado}`);
    const data = await res.json();

    todasLasPostulaciones = data.postulaciones || [];

    // Stats
    const statsRes = await fetch(`${API}/api/charlas/postulaciones/todas`);
    const statsData = await statsRes.json();
    const todas = statsData.postulaciones || [];

    document.getElementById('stat-total').textContent = todas.length;
    document.getElementById('stat-pendientes').textContent = todas.filter(p => p.estado === 'pendiente').length;
    document.getElementById('stat-aprobadas').textContent = todas.filter(p => p.estado === 'aprobada').length;
    document.getElementById('stat-realizadas').textContent = todas.filter(p => p.estado === 'realizada').length;

    document.getElementById('ultima-actualizacion').textContent =
      'Actualizado: ' + new Date().toLocaleString('es-CL');

    renderTabla(todasLasPostulaciones);

  } catch (e) {
    document.getElementById('tabla-contenido').innerHTML =
      '<div class="empty-state"><div class="icon">⚠️</div><p>Error conectando con el servidor</p></div>';
  }
}

function filtrarLocal() {
  const busqueda = document.getElementById('filtro-buscar').value.toLowerCase();
  const filtradas = todasLasPostulaciones.filter(p =>
    (p.nombre || '').toLowerCase().includes(busqueda) ||
    (p.empresa || '').toLowerCase().includes(busqueda) ||
    (p.email || '').toLowerCase().includes(busqueda) ||
    (p.ciudad || '').toLowerCase().includes(busqueda)
  );
  renderTabla(filtradas);
}

function renderTabla(postulaciones) {
  if (postulaciones.length === 0) {
    document.getElementById('tabla-contenido').innerHTML =
      '<div class="empty-state"><div class="icon">📭</div><p>No hay postulaciones todavía</p></div>';
    return;
  }

  const filas = postulaciones.map(p => {
    const fecha = p.created_at ? new Date(p.created_at).toLocaleDateString('es-CL') : '—';
    const estado = p.estado || 'pendiente';

    return `
      <tr>
        <td>${fecha}</td>
        <td>
          <div class="nombre">${p.nombre || '—'}</div>
          <div style="font-size:11px;color:#64748b;margin-top:2px">${p.telefono || ''}</div>
        </td>
        <td>
          <div class="empresa">${p.empresa || '—'}</div>
          <div style="font-size:11px;color:#64748b;margin-top:2px">${p.ciudad || ''}</div>
        </td>
        <td>
          <a href="mailto:${p.email}" class="email-link">${p.email || '—'}</a>
        </td>
        <td><span class="cargo-tag">${p.cargo || '—'}</span></td>
        <td>${p.tamano_equipo || p.empleados || '—'}</td>
        <td>${p.rubro || '—'}</td>
        <td style="max-width:200px;font-size:12px;color:#94a3b8">${(p.situacion || '—').substring(0, 80)}${(p.situacion || '').length > 80 ? '...' : ''}</td>
        <td><span class="badge badge-${estado}">${estado}</span></td>
      </tr>
    `;
  }).join('');

  document.getElementById('tabla-contenido').innerHTML = `
    <table>
      <thead>
        <tr>
          <th>Fecha</th>
          <th>Contacto</th>
          <th>Empresa</th>
          <th>Email</th>
          <th>Cargo</th>
          <th>Equipo</th>
          <th>Rubro</th>
          <th>Situación</th>
          <th>Estado</th>
        </tr>
      </thead>
      <tbody>${filas}</tbody>
    </table>
  `;
}
</script>
</body>
</html>
